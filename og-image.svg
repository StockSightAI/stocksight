<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05050e"/>
      <stop offset="100%" style="stop-color:#0d0d1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Purple glow blob top-right -->
  <ellipse cx="1050" cy="120" rx="320" ry="200" fill="#6c5ce7" opacity="0.07"/>
  <!-- Purple glow blob bottom-left -->
  <ellipse cx="150" cy="520" rx="280" ry="180" fill="#a29bfe" opacity="0.05"/>

  <!-- Chart area (right side) -->
  <g transform="translate(680, 80)">
    <!-- Chart background card -->
    <rect x="0" y="0" width="460" height="300" rx="16" fill="#0c0c18" opacity="0.8" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>

    <!-- Chart fill -->
    <path d="M 30 240 L 60 210 L 100 220 L 140 180 L 180 160 L 220 130 L 260 110 L 300 90 L 340 70 L 380 50 L 420 40 L 420 270 L 30 270 Z"
          fill="url(#chartGrad)"/>

    <!-- Chart line -->
    <path d="M 30 240 L 60 210 L 100 220 L 140 180 L 180 160 L 220 130 L 260 110 L 300 90 L 340 70 L 380 50 L 420 40"
          fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Dot at end of line -->
    <circle cx="420" cy="40" r="6" fill="#a29bfe" filter="url(#glow)"/>

    <!-- Price label -->
    <rect x="330" y="14" width="110" height="26" rx="6" fill="#6c5ce7" opacity="0.2" stroke="#6c5ce7" stroke-width="1" stroke-opacity="0.4"/>
    <text x="385" y="31" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#a29bfe" text-anchor="middle">+24.7%  ↑</text>

    <!-- X axis labels -->
    <text x="30" y="290" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.25">Jan</text>
    <text x="140" y="290" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.25">Mar</text>
    <text x="260" y="290" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.25">Jun</text>
    <text x="380" y="290" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.25">Now</text>

    <!-- Ticker chips -->
    <rect x="30" y="320" width="66" height="26" rx="13" fill="#6c5ce7" opacity="0.15" stroke="#6c5ce7" stroke-width="1" stroke-opacity="0.3"/>
    <text x="63" y="337" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#a29bfe" text-anchor="middle">NVDA</text>

    <rect x="106" y="320" width="60" height="26" rx="13" fill="#00c97a" opacity="0.1" stroke="#00c97a" stroke-width="1" stroke-opacity="0.3"/>
    <text x="136" y="337" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#00c97a" text-anchor="middle">AAPL</text>

    <rect x="176" y="320" width="56" height="26" rx="13" fill="#f5ae0b" opacity="0.1" stroke="#f5ae0b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="204" y="337" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#f5ae0b" text-anchor="middle">BTC</text>

    <rect x="242" y="320" width="60" height="26" rx="13" fill="#00b4d8" opacity="0.1" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="272" y="337" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#00b4d8" text-anchor="middle">TSLA</text>
  </g>

  <!-- Left side content -->
  <!-- Logo mark -->
  <rect x="80" y="155" width="52" height="52" rx="14" fill="#6c5ce7" opacity="0.2" stroke="#6c5ce7" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="106" y="190" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#a29bfe" text-anchor="middle">S</text>

  <!-- Brand name -->
  <text x="80" y="268" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-2">StockSight</text>

  <!-- Accent line under name -->
  <rect x="80" y="282" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="80" y="338" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" opacity="0.6" letter-spacing="0.2">AI-powered stock research, free for everyone.</text>

  <!-- Feature pills -->
  <g transform="translate(80, 380)">
    <rect x="0" y="0" width="130" height="34" rx="17" fill="#6c5ce7" opacity="0.15" stroke="#6c5ce7" stroke-width="1" stroke-opacity="0.35"/>
    <text x="65" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#a29bfe" text-anchor="middle">📈 Live Charts</text>

    <rect x="144" y="0" width="120" height="34" rx="17" fill="#00c97a" opacity="0.1" stroke="#00c97a" stroke-width="1" stroke-opacity="0.3"/>
    <text x="204" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#00c97a" text-anchor="middle">🤖 AI Analysis</text>

    <rect x="278" y="0" width="140" height="34" rx="17" fill="#f5ae0b" opacity="0.1" stroke="#f5ae0b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="348" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f5ae0b" text-anchor="middle">🎮 Paper Trading</text>

    <rect x="432" y="0" width="120" height="34" rx="17" fill="#00b4d8" opacity="0.1" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="492" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#00b4d8" text-anchor="middle">💼 Portfolio</text>
  </g>

  <!-- URL -->
  <text x="80" y="565" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.3" letter-spacing="1">stocksightai.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
